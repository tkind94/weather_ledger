version: 2

sources:
  - name: weather_ledger
    description: Raw weather observations ingested from Open-Meteo.
    database: weather
    schema: main
    tables:
      - name: raw_weather
        description: Daily precipitation and maximum temperature values for Fort Collins, Colorado.

models:
  - name: weather_monthly_extremes
    description: Monthly max/min temperatures by location.

  - name: dashboard_summary
    description: Pre-computed metrics for the frontend dashboard.
