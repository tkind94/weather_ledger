services:
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    working_dir: /app/frontend
    environment:
      PORT: 3000
      WEATHER_LEDGER_SQLITE_PATH: /app/database/weather.sqlite3
    volumes:
      - ./database:/app/database
    ports:
      - "3000:3000"
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN:-replace-me}
    depends_on:
      - frontend
    profiles:
      - tunnel
    restart: unless-stopped
